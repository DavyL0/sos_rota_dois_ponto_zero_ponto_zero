<div class="sidebar-container" [ngClass]="{'collapsed': colapsada}">
  <div class="sidebar-header">
    <p-button
      [icon]="'pi pi-bars'"
      (onClick)="toggleColapsada()"
      styleClass="p-button-text p-button-secondary toggle-btn">
    </p-button>
    @if (!colapsada) {
      <div class="nome-container">
        <img ngSrc="logo_cortada.png" alt="Logo SOS Rota" class="app-logo" width="32" height="32"/>
        <span class="app-name">SOS Rota</span>
      </div>
    }
  </div>

  <ul class="menu-list">
    @for (item of itensMenu; track item.label) {
      <li>
        <a [routerLink]="item.rota" routerLinkActive="active-menu" [routerLinkActiveOptions]="{ exact: !item.filhos }"
           class="menu-item" (click)="toggleSubmenu(item)">
          <i [class]="item.icon"></i>
          @if (!colapsada) {
            <span class="menu-label">{{ item.label }}</span>
            @if (item.filhos) {
              <i class="pi submenu-arrow" [ngClass]="item.aberto ? 'pi-chevron-down' : 'pi-chevron-right'"
                 (click)="toggleSeta(item, $event)"></i>
            }
          }
        </a>

        @if (item.filhos && item.aberto && !colapsada) {
          <ul class="submenu-list">
            @for (filho of item.filhos; track filho.label) {
              <li>
                <a [routerLink]="filho.rota"
                   [queryParams]="filho.queryParams"
                   routerLinkActive="active-submenu-item"
                   class="menu-item submenu-item">
                  <i [class]="filho.icon"></i>
                  <span class="menu-label">{{ filho.label }}</span>
                </a>
              </li>
            }
          </ul>
        }
      </li>
    }
  </ul>

  <div class="sidebar-footer">
    <p-button
      [icon]="modoEscuro ? 'pi pi-sun' : 'pi pi-moon'"
      (onClick)="toggleTema()"
      [rounded]="true"
      [text]="true"
      severity="secondary">
    </p-button>
  </div>
</div>
