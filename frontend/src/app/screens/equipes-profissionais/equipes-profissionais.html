<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Profissionais e equipes</h1>
    </div>
  </div>

  <p-toast position="top-center"></p-toast>
  <p-confirm-dialog></p-confirm-dialog>

  <div class="tabs-container">
    <p-tabs [(value)]="abaAtiva" >
      <p-tablist class="tab-list">
        <p-tab [value]="0">Profissionais</p-tab>
        <p-tab [value]="1">EquipesProfissionais</p-tab>
      </p-tablist>
      <p-tabpanels>
        <p-tabpanel [value]="0">
            <app-profissionais-component></app-profissionais-component>
        </p-tabpanel>
        <p-tabpanel [value]="1">
          <ng-template #content>
            <div class="table-wrapper">

            </div>
          </ng-template>
        </p-tabpanel>
      </p-tabpanels>
    </p-tabs>
  </div>

</div>
